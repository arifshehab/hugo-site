# a summary about you
summary: |
  I spend my days thinking about global trade risks. I spend my nights trying not to think about it.

  Before diving into trade policy, I was a Product Manager at [Open Government Products](https://www.open.gov.sg/). If you saw election visualizations on Channel News Asia or The Business Times recently, there’s a good chance you were looking at something my team and I was obsessing over.
  
  Economist by training who builds products as my hobby.

  My interests include:
  - International trade 🌏
  - Industrial Organisation 🏭
  - Machine Learning ✨
  - Cycling 🚴
  - Adventure Sports 🤿
  
